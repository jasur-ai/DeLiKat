<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DeLiKet — Emailni tasdiqlash</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/style.css">
<style>
.vf-page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem 1rem}
.vf-card{text-align:center;padding:2.5rem;border:1px solid var(--border-primary);border-radius:var(--radius-xl);max-width:400px;width:100%;box-shadow:var(--shadow-lg)}
.vf-icon{font-size:3rem;display:block;margin-bottom:1rem}
.vf-title{font-size:1.125rem;font-weight:700;margin-bottom:0.25rem}
.vf-text{font-size:0.875rem;color:var(--text-tertiary);margin-bottom:1.25rem;line-height:1.6}
.loader{margin:0 auto}

/* Mobile toggle for auth pages */
.auth-mobile-toggle{display:none;flex-direction:column;gap:5px;padding:8px;border-radius:var(--radius-md);cursor:pointer;background:none;border:none;z-index:101;position:fixed;top:12px;right:12px}
.auth-mobile-toggle:hover{opacity:0.8}
.auth-mobile-toggle span{display:block;width:20px;height:2px;background:var(--text-primary);border-radius:2px;transition:all 0.25s var(--ease-out);transform-origin:center}
.auth-mobile-toggle.active span:nth-child(1){transform:translateY(7px) rotate(45deg)}
.auth-mobile-toggle.active span:nth-child(2){opacity:0;transform:scaleX(0)}
.auth-mobile-toggle.active span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}
.mobile-bottom-nav.open{position:fixed;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:100;background:var(--surface);border-top:none;padding:80px 20px}
.mobile-bottom-nav.open .mobile-bottom-nav-items{flex-direction:column;gap:8px;max-width:none}
.mobile-bottom-nav.open .mobile-bottom-nav-items a{font-size:1.125rem;padding:12px 20px}
@media(max-width:768px){.auth-mobile-toggle{display:flex}}
</style>
</head>
<body>
<h1 class="sr-only">DeLiKet - Emailni tasdiqlash</h1>

<div class="page-loader" id="pageLoader">
<div class="loader-ring"></div>
<span class="loader-text">DeLiKet yuklanmoqda...</span>
</div>>
<div class="vf-page">
 <div class="vf-card" id="card">
 <div class="loader" id="loaderEl"></div>
 <div id="contentEl" style="display:none">
 <span class="vf-icon" id="iconEl"></span>
 <div class="vf-title" id="titleEl">Tekshirilmoqda...</div>
 <div class="vf-text" id="textEl">Email manzilingiz tasdiqlanmoqda...</div>
 <a href="/login" class="btn btn-primary" id="btnEl">Kirish</a>
 </div>
 </div>
</div>
<script>
async function init() {
 const params = new URLSearchParams(window.location.search);
 const token = params.get('token');
 if (!token) {
 document.getElementById('loaderEl').style.display = 'none';
 document.getElementById('contentEl').style.display = 'block';
 document.getElementById('iconEl').textContent = '✕';
 document.getElementById('titleEl').textContent = 'Noto\'g\'ri havola';
 document.getElementById('textEl').textContent = 'Tasdiqlash havolasida token topilmadi';
 return;
 }
 try {
 const res = await fetch(`/api/auth/verify-email?token=${token}`);
 const data = await res.json();
 document.getElementById('loaderEl').style.display = 'none';
 document.getElementById('contentEl').style.display = 'block';
 if (data.ok) {
 document.getElementById('iconEl').textContent = '✓';
 document.getElementById('titleEl').textContent = 'Email tasdiqlandi!';
 document.getElementById('textEl').textContent = 'Email manzilingiz muvaffaqiyatli tasdiqlandi. Endi to\'liq imkoniyatlardan foydalanishingiz mumkin.';
 document.getElementById('btnEl').textContent = 'Profilga o\'tish';
 document.getElementById('btnEl').href = '/profile';
 } else {
 throw new Error(data.detail || 'Xatolik');
 }
 } catch (e) {
 document.getElementById('loaderEl').style.display = 'none';
 document.getElementById('contentEl').style.display = 'block';
 document.getElementById('iconEl').textContent = '✕';
 document.getElementById('titleEl').textContent = 'Xatolik yuz berdi';
 document.getElementById('textEl').textContent = e.message || 'Emailni tasdiqlashda xatolik yuz berdi';
 document.getElementById('btnEl').textContent = 'Qayta urinish';
 document.getElementById('btnEl').href = '/profile';
 }
}
document.addEventListener('DOMContentLoaded', init);


// Theme
function setTheme(t){document.documentElement.setAttribute('data-theme',t);localStorage.setItem('deliket-theme',t)}
function initTheme(){var s=localStorage.getItem('deliket-theme'),p=window.matchMedia('(prefers-color-scheme:dark)').matches;document.documentElement.setAttribute('data-theme',s||(p?'dark':'light'))}
function toggleTheme(){var c=document.documentElement.getAttribute('data-theme');setTheme(c==='dark'?'light':'dark')}
</script>

<button class="auth-mobile-toggle" id="mobileToggleBtn" aria-label="Menyu">
<span></span><span></span><span></span>
</button>
<nav class="mobile-bottom-nav" id="mobileBottomNav" aria-label="Mobil navigatsiya">
<div class="mobile-bottom-nav-items">
<a href="/" class="active"><span class="nav-icon"></span><span class="nav-label">Bosh</span></a>
<a href="/analytics"><span class="nav-icon"></span><span class="nav-label">Analytics</span></a>
<a href="/seller"><span class="nav-icon"></span><span class="nav-label">Sotuvchilar</span></a>
<a href="/deals"><span class="nav-icon"></span><span class="nav-label">Bitimlar</span></a>
<a href="/academy"><span class="nav-icon"></span><span class="nav-label">Academy</span></a>
</div>
</nav>
<script>
document.addEventListener('DOMContentLoaded',function(){
var btn=document.getElementById('mobileToggleBtn'),bn=document.querySelector('.mobile-bottom-nav');
if(btn&&bn){btn.addEventListener('click',function(){btn.classList.toggle('active');bn.classList.toggle('open')})}
});
</script>
</body>
</html>
