# DeLiKet Bot — Render.com Deployment Configuration
# ===================================================
# This file auto-configures a Render Worker Service for the Telegram bot.
# 
# How to use:
#   1. Push this repo to GitHub
#   2. Go to https://dashboard.render.com
#   3. Click "New +" → "Blueprint"
#   4. Connect your GitHub repo → Render reads render.yaml
#   5. Set BOT_TOKEN and DATABASE_URL in Render dashboard
#   6. Click "Apply" — auto-deploys!
#
# Manual alternative:
#   Render Dashboard → New Web Service
#   - Name: deliket-bot
#   - Runtime: Python 3
#   - Build: pip install -r requirements.txt
#   - Start: python bot_starter.py
#   - Plan: Free (sleeps 15min) or Starter $7/mo (24/7)

services:
  - type: worker
    name: deliket-bot
    runtime: python
    repo: https://github.com/jasur-ai/DeLiKat
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: python bot_starter.py
    envVars:
      - key: BOT_TOKEN
        sync: false
        comment: "Telegram bot token from @BotFather (required)"
      - key: DATABASE_URL
        sync: false
        comment: "Neon PostgreSQL connection string (required)"
      - key: WEB_URL
        value: "https://delikat.vercel.app"
        comment: "Frontend URL for bot-to-web links"
      - key: LOG_LEVEL
        value: "INFO"
        comment: "Logging level: INFO, DEBUG, WARNING"
    plan: free
    autoDeploy: true
