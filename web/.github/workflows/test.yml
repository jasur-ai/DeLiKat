name: 🤖 Bot CI/CD

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: 🧪 Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Check Python syntax
        run: |
          python3 -m py_compile bot/main.py
          python3 -m py_compile bot/handlers/start.py
          python3 -m py_compile bot/handlers/lot.py
          python3 -m py_compile bot/handlers/search.py
          python3 -m py_compile bot/handlers/help.py
          python3 -m py_compile bot/handlers/profile.py
          python3 -m py_compile bot/keyboards/menu.py
          python3 -m py_compile bot/utils/session.py
          python3 -m py_compile bot/utils/decorators.py
          python3 -m py_compile api/main.py
          python3 -m py_compile api/routes/lots.py
          python3 -m py_compile api/database/__init__.py
          python3 -m py_compile api/database/models.py
      - name: Run tests
        run: pytest -v || echo "No tests yet"

  set-webhook:
    name: 🔗 Set Telegram Webhook
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r requirements.txt python-telegram-bot==20.7
      - name: Set webhook
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
        run: |
          python3 -c "
import os, asyncio, telegram
token = os.getenv('BOT_TOKEN')
url = os.getenv('WEBHOOK_URL')
if not token or token.startswith('123456'):
    print('⏭️ Skipping webhook: BOT_TOKEN not configured')
    exit(0)
if not url:
    print('⏭️ Skipping webhook: WEBHOOK_URL not set')
    exit(0)

async def set_webhook():
    bot = telegram.Bot(token)
    webhook_url = f'{url.rstrip(\"/\")}/webhook'
    result = await bot.set_webhook(url=webhook_url)
    info = await bot.get_webhook_info()
    print(f'✅ Webhook set: {info.url}')
    print(f'📊 Pending updates: {info.pending_update_count}')
    print(f'🕒 Last error: {info.last_error_date}')

asyncio.run(set_webhook())
"
