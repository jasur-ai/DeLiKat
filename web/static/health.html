<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DeLiKet — Site Health Dashboard</title>
<meta name="description" content="DeLiKet platformasi to'liq tahlil dashbordi">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ── CSS Variables ── */
:root {
  --bg: #0b0d12;
  --surface: #13161d;
  --surface-2: #1a1e28;
  --surface-3: #222738;
  --border: #2a2f42;
  --text: #e8eaed;
  --text-dim: #8b8fa3;
  --text-muted: #5c6178;
  --green: #22c55e;
  --green-bg: rgba(34,197,94,0.12);
  --red: #ef4444;
  --red-bg: rgba(239,68,68,0.12);
  --yellow: #f59e0b;
  --yellow-bg: rgba(245,158,11,0.12);
  --blue: #3b82f6;
  --blue-bg: rgba(59,130,246,0.12);
  --accent: #f59e0b;
  --radius: 10px;
  --radius-sm: 6px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.6;
}
.mono { font-family: 'JetBrains Mono', monospace; font-size: 0.8125rem; }

/* ── Container ── */
.container { max-width: 1000px; margin: 0 auto; padding: 0 1rem; }

/* ── Header ── */
.header {
  padding: 1.5rem 0;
  border-bottom: 1px solid var(--border);
  margin-bottom: 1.5rem;
}
.header-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 1rem;
  flex-wrap: wrap;
}
.header-logo {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  font-size: 1.125rem;
  font-weight: 700;
  text-decoration: none;
  color: var(--text);
}
.header-logo span { color: var(--accent); }
.header-controls {
  display: flex;
  align-items: center;
  gap: 0.75rem;
}
.header-controls select {
  padding: 0.375rem 0.75rem;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--surface-2);
  color: var(--text);
  font-size: 0.8125rem;
  cursor: pointer;
  outline: none;
}
.header-controls select:focus {
  border-color: var(--accent);
}
.refresh-btn {
  padding: 0.375rem 1rem;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--surface-2);
  color: var(--text);
  font-size: 0.8125rem;
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  gap: 0.375rem;
}
.refresh-btn:hover {
  border-color: var(--text-dim);
  background: var(--surface-3);
}
.refresh-btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}
.refresh-btn.spinning svg { animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Score Card ── */
.score-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.5rem;
  margin-bottom: 1.5rem;
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 1.5rem;
  align-items: center;
}
.score-ring {
  width: 80px;
  height: 80px;
  position: relative;
}
.score-ring svg {
  width: 80px;
  height: 80px;
  transform: rotate(-90deg);
}
.score-ring svg circle {
  fill: none;
  stroke-width: 6;
  cx: 40;
  cy: 40;
  r: 34;
}
.score-ring .bg-circle { stroke: var(--surface-3); }
.score-ring .fg-circle {
  stroke: var(--green);
  stroke-linecap: round;
  transition: stroke-dashoffset 0.8s ease;
}
.score-ring-value {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.25rem;
  font-weight: 700;
}
.score-info h2 { font-size: 1.125rem; font-weight: 600; margin-bottom: 0.25rem; }
.score-info p { font-size: 0.8125rem; color: var(--text-dim); }
.score-stats {
  display: flex;
  gap: 1rem;
  margin-top: 0.75rem;
  flex-wrap: wrap;
}
.score-stat {
  display: flex;
  align-items: center;
  gap: 0.375rem;
  font-size: 0.8125rem;
  font-weight: 500;
}
.score-stat .dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
}
.score-stat .dot.green { background: var(--green); }
.score-stat .dot.yellow { background: var(--yellow); }
.score-stat .dot.red { background: var(--red); }
#scoreVersion {
  font-size: 0.8125rem;
  color: var(--text-dim);
  margin-top: 0.375rem;
}

/* ── Toggle Bar ── */
.toggle-bar {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 0.75rem 1rem;
  margin-bottom: 1.5rem;
  display: flex;
  align-items: center;
  gap: 0.75rem;
  flex-wrap: wrap;
}
.toggle-bar-label {
  font-size: 0.75rem;
  font-weight: 600;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.04em;
  margin-right: 0.25rem;
}
.toggle-btn {
  padding: 0.25rem 0.625rem;
  border: 1px solid var(--border);
  border-radius: 100px;
  background: var(--surface-2);
  color: var(--text-dim);
  font-size: 0.6875rem;
  cursor: pointer;
  transition: all 0.15s;
  font-family: inherit;
}
.toggle-btn:hover { border-color: var(--text-dim); }
.toggle-btn.active {
  background: var(--green-bg);
  border-color: var(--green);
  color: var(--green);
}
.toggle-btn.inactive {
  background: var(--red-bg);
  border-color: var(--red);
  color: var(--red);
  opacity: 0.6;
}

/* ── Category ── */
.category {
  margin-bottom: 1.25rem;
}
.category-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0.625rem 1rem;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: background 0.15s;
  user-select: none;
}
.category-header:hover { background: var(--surface-3); }
.category-header-left {
  display: flex;
  align-items: center;
  gap: 0.5rem;
}
.category-icon { font-size: 1rem; }
.category-name { font-size: 0.8125rem; font-weight: 600; }
.category-count {
  font-size: 0.6875rem;
  color: var(--text-dim);
  padding: 0.125rem 0.375rem;
  border-radius: 100px;
  background: var(--surface-3);
}
.category-chevron {
  font-size: 0.75rem;
  color: var(--text-dim);
  transition: transform 0.2s;
}
.category.collapsed .category-chevron { transform: rotate(-90deg); }
.category.collapsed .category-items { display: none; }

/* ── Test Item ── */
.category-items { margin-top: 0.375rem; }
.test-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0.5rem 1rem;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  margin-bottom: 0.25rem;
  transition: all 0.15s;
  gap: 0.75rem;
}
.test-item:hover { border-color: var(--surface-3); background: rgba(255,255,255,0.02); }
.test-item-left {
  display: flex;
  align-items: center;
  gap: 0.625rem;
  flex: 1;
  min-width: 0;
}
.test-status-icon {
  width: 18px;
  text-align: center;
  font-size: 0.75rem;
  flex-shrink: 0;
}
.test-status-icon.ok { color: var(--green); }
.test-status-icon.fail { color: var(--red); }
.test-status-icon.warning { color: var(--yellow); }
.test-status-icon.skip { color: var(--text-muted); }
.test-status-icon.loading { color: var(--text-dim); animation: pulse 1s infinite; }
@keyframes pulse { 0%,100% { opacity: 0.4; } 50% { opacity: 1; } }
.test-method {
  font-size: 0.625rem;
  font-weight: 700;
  padding: 0.125rem 0.3125rem;
  border-radius: 3px;
  background: var(--surface-3);
  color: var(--text-dim);
  flex-shrink: 0;
  font-family: 'JetBrains Mono', monospace;
}
.test-method.get { color: #60a5fa; background: rgba(96,165,250,0.12); }
.test-method.post { color: #34d399; background: rgba(52,211,153,0.12); }
.test-method.patch { color: #fbbf24; background: rgba(251,191,36,0.12); }
.test-path {
  font-size: 0.8125rem;
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.test-status-label {
  font-size: 0.6875rem;
  font-weight: 500;
  padding: 0.125rem 0.5rem;
  border-radius: 100px;
  flex-shrink: 0;
}
.test-status-label.ok { background: var(--green-bg); color: var(--green); }
.test-status-label.fail { background: var(--red-bg); color: var(--red); }
.test-status-label.warning { background: var(--yellow-bg); color: var(--yellow); }
.test-status-label.skip { background: var(--surface-3); color: var(--text-dim); }
.test-detail {
  font-size: 0.6875rem;
  color: var(--text-muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 200px;
  flex-shrink: 0;
}

/* ── Footer ── */
.footer {
  text-align: center;
  padding: 2rem 0;
  font-size: 0.75rem;
  color: var(--text-muted);
  border-top: 1px solid var(--border);
  margin-top: 2rem;
}

/* ── Loading skeleton ── */
.loading-skeleton {
  animation: shimmer 1.5s infinite;
  background: linear-gradient(90deg, var(--surface-2) 25%, var(--surface-3) 50%, var(--surface-2) 75%);
  background-size: 200% 100%;
  border-radius: var(--radius-sm);
  height: 40px;
  margin-bottom: 0.375rem;
}
@keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

/* ── Responsive ── */
@media(max-width:640px) {
  .score-card { grid-template-columns: 1fr; text-align: center; }
  .score-ring { margin: 0 auto; }
  .score-stats { justify-content: center; }
  .test-item { flex-wrap: wrap; }
  .test-detail { max-width: 100%; }
}

/* ── Timestamp ── */
#lastUpdated {
  font-size: 0.75rem;
  color: var(--text-muted);
  margin-top: 0.25rem;
}
</style>
</head>
<body>

<div class="container">
  <!-- Header -->
  <header class="header">
    <div class="header-inner">
      <a href="/" class="header-logo">
        <svg viewBox="0 0 36 36" fill="none" style="width:28px;height:28px">
          <defs><linearGradient id="lgH" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#f59e0b"/><stop offset="100%" stop-color="#d97706"/></linearGradient></defs>
          <rect x="0" y="0" width="36" height="36" rx="9" fill="url(#lgH)"/>
          <path d="M9 9h8a9 9 0 0 1 0 18H9V9z" fill="white" opacity="0.95"/>
          <circle cx="26" cy="18" r="2.5" fill="white" opacity="0.6"/>
        </svg>
        DeLi<span>Ket</span>
        <span style="font-size:0.75rem;color:var(--text-dim);font-weight:400;margin-left:0.25rem">· Health</span>
      </a>
      <div class="header-controls">
        <select id="refreshInterval">
          <option value="0">Auto-refresh: Off</option>
          <option value="10">10s</option>
          <option value="30" selected>30s</option>
          <option value="60">60s</option>
          <option value="300">5min</option>
        </select>
        <button class="refresh-btn" id="refreshBtn" onclick="runAll()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
          Refresh
        </button>
      </div>
    </div>
  </header>

  <!-- Score Card -->
  <div class="score-card" id="scoreCard">
    <div class="score-ring">
      <svg viewBox="0 0 80 80">
        <circle class="bg-circle" cx="40" cy="40" r="34"/>
        <circle class="fg-circle" id="scoreRing" cx="40" cy="40" r="34" stroke-dasharray="213.6" stroke-dashoffset="0"/>
      </svg>
      <div class="score-ring-value" id="scoreValue">--</div>
    </div>
    <div class="score-info">
      <h2 id="scoreTitle">System Health Check</h2>
      <p id="scoreSubtitle">Testing all API endpoints, database, and seed data...</p>
      <div class="score-stats">
        <span class="score-stat"><span class="dot green"></span> <span id="statOk">0</span> OK</span>
        <span class="score-stat"><span class="dot yellow"></span> <span id="statWarn">0</span> Warning</span>
        <span class="score-stat"><span class="dot red"></span> <span id="statFail">0</span> Fail</span>
      </div>
      <div id="scoreVersion"></div>
      <div id="lastUpdated"></div>
    </div>
  </div>

  <!-- Toggle Bar -->
  <div class="toggle-bar" id="toggleBar">
    <span class="toggle-bar-label">Toggles</span>
    <button class="toggle-btn active" data-toggle="all" onclick="toggleAll(this)">All</button>
    <button class="toggle-btn active" data-category="database" onclick="toggleCategory('database', this)">🗄️ DB</button>
    <button class="toggle-btn active" data-category="endpoint" onclick="toggleCategory('endpoint', this)">🌐 API</button>
    <button class="toggle-btn active" data-category="seed" onclick="toggleCategory('seed', this)">🌱 Seed</button>
    <button class="toggle-btn active" data-category="e2e" onclick="toggleCategory('e2e', this)">🧪 E2E</button>
  </div>

  <!-- Results Container -->
  <div id="resultsContainer">
    <div class="loading-skeleton" style="width:100%"></div>
    <div class="loading-skeleton" style="width:85%"></div>
    <div class="loading-skeleton" style="width:70%"></div>
    <div class="loading-skeleton" style="width:90%"></div>
    <div class="loading-skeleton" style="width:75%"></div>
    <div class="loading-skeleton" style="width:60%"></div>
  </div>

  <footer class="footer">
    DeLiKet Health Dashboard · <a href="/" style="color:var(--accent);text-decoration:none">Back to site</a> · <a href="/api/health/check" target="_blank" style="color:var(--text-dim);text-decoration:none">JSON API</a>
  </footer>
</div>

<script>
// ════════════════════════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════════════════════════

const state = {
  results: {},
  activeToggles: { 'database': true, 'endpoint': true, 'seed': true },
  interval: null,
  isLoading: false,
};

// ── All test definitions ──
// Format: { category, icon, name, method, path, test: async () => result }
// Each test is a function that returns { status: "ok"|"fail"|"warning"|"skip", detail: "..." }

const TESTS = [
  // ═══ DATABASE ═══
  {
    category: 'database',
    icon: '🗄️',
    name: 'DB Connection',
    method: 'PING',
    path: 'database',
    test: async () => {
      const r = await fetch('/api/ping');
      const d = await r.json();
      return d.status === 'ok'
        ? { status: 'ok', detail: `v${d.version}` }
        : { status: 'fail', detail: JSON.stringify(d) };
    }
  },
  {
    category: 'database',
    icon: '🗄️',
    name: 'DB Tables',
    method: 'CHECK',
    path: 'tables',
    test: async () => {
      const r = await fetch('/api/health/check');
      const d = await r.json();
      const tbl = d.results?.database_tables;
      return tbl ? { status: tbl.status, detail: tbl.detail } : { status: 'skip', detail: 'No data' };
    }
  },
  {
    category: 'database',
    icon: '🗄️',
    name: 'DB Stats',
    method: 'GET',
    path: '/api/stats',
    test: async () => {
      const r = await fetch('/api/stats');
      const d = await r.json();
      return d.lots > 0
        ? { status: 'ok', detail: `${d.users} users, ${d.lots} lots, ${d.bids} bids` }
        : { status: 'warning', detail: 'Empty database' };
    }
  },
  {
    category: 'database',
    icon: '🔗',
    name: 'Foreign Keys',
    method: 'CHECK',
    path: 'referential integrity',
    test: async () => {
      const r = await fetch('/api/health/check');
      const d = await r.json();
      const fk = d.results?.foreign_keys;
      return fk ? { status: fk.status, detail: fk.detail } : { status: 'skip', detail: 'No data' };
    }
  },

  // ═══ API ENDPOINTS ═══
  {
    category: 'endpoint',
    icon: '❤️',
    name: 'Ping',
    method: 'GET',
    path: '/api/ping',
    test: async () => {
      const r = await fetch('/api/ping');
      const d = await r.json();
      return d.status === 'ok'
        ? { status: 'ok', detail: `v${d.version}` }
        : { status: 'fail', detail: JSON.stringify(d) };
    }
  },
  {
    category: 'endpoint',
    icon: '📋',
    name: 'Lots List',
    method: 'GET',
    path: '/api/lots?limit=3',
    test: async () => {
      const r = await fetch('/api/lots?limit=3');
      const d = await r.json();
      return d.items
        ? { status: 'ok', detail: `${d.items.length} items (total: ${d.total})` }
        : { status: 'fail', detail: 'No items field' };
    }
  },
  {
    category: 'endpoint',
    icon: '📋',
    name: 'Lot Detail',
    method: 'GET',
    path: '/api/lots/1',
    test: async () => {
      const r = await fetch('/api/lots/1');
      if (r.status === 404) return { status: 'warning', detail: 'Lot #1 not found' };
      const d = await r.json();
      return d.title
        ? { status: 'ok', detail: d.title.slice(0, 50) }
        : { status: 'fail', detail: 'Missing title' };
    }
  },
  {
    category: 'endpoint',
    icon: '📁',
    name: 'Categories',
    method: 'GET',
    path: '/api/categories',
    test: async () => {
      const r = await fetch('/api/categories');
      const d = await r.json();
      return d.categories?.length > 0
        ? { status: 'ok', detail: `${d.categories.length} categories` }
        : { status: 'fail', detail: 'No categories' };
    }
  },
  {
    category: 'endpoint',
    icon: '📊',
    name: 'Analytics',
    method: 'GET',
    path: '/api/analytics',
    test: async () => {
      const r = await fetch('/api/analytics');
      const d = await r.json();
      return d.ok
        ? { status: 'ok', detail: `${d.stats?.total_lots} lots, ${d.stats?.users} users` }
        : { status: 'fail', detail: JSON.stringify(d) };
    }
  },
  {
    category: 'endpoint',
    icon: '🔐',
    name: 'Register',
    method: 'POST',
    path: '/api/auth/register',
    test: async () => {
      const ts = Date.now();
      const r = await fetch('/api/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: 'HealthCheck', email: `health_${ts}@test.uz`, password: 'test1234' }),
      });
      if (r.status === 409) return { status: 'ok', detail: 'User exists' };
      const d = await r.json();
      return d.ok
        ? { status: 'ok', detail: `Created: ${d.user?.name}` }
        : { status: 'warning', detail: d.detail || 'Unknown' };
    }
  },
  {
    category: 'endpoint',
    icon: '🔐',
    name: 'Login',
    method: 'POST',
    path: '/api/auth/login',
    test: async () => {
      const r = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: 'health_test@test.uz', password: 'test1234' }),
      });
      const d = await r.json();
      return d.ok
        ? { status: 'ok', detail: `Logged in: ${d.user?.name}` }
        : { status: 'warning', detail: d.detail || `HTTP ${r.status}` };
    }
  },
  {
    category: 'endpoint',
    icon: '🎓',
    name: 'Academy',
    method: 'GET',
    path: '/api/academy/lessons',
    test: async () => {
      const r = await fetch('/api/academy/lessons');
      const d = await r.json();
      return d.lessons
        ? { status: 'ok', detail: `${d.total_lessons} lessons (${d.total_xp} XP)` }
        : { status: 'fail', detail: 'No lessons' };
    }
  },
  {
    category: 'endpoint',
    icon: '🌍',
    name: 'Crossborder',
    method: 'GET',
    path: '/api/crossborder/countries',
    test: async () => {
      const r = await fetch('/api/crossborder/countries');
      const d = await r.json();
      return d.countries
        ? { status: 'ok', detail: `${d.total} supported countries` }
        : { status: 'fail', detail: 'No countries' };
    }
  },
  {
    category: 'endpoint',
    icon: '💎',
    name: 'Subscription Plans',
    method: 'GET',
    path: '/api/subscription/plans',
    test: async () => {
      const r = await fetch('/api/subscription/plans');
      const d = await r.json();
      return d.plans
        ? { status: 'ok', detail: `${d.total_plans} plans: ${d.plans.map(p => p.name).join(', ')}` }
        : { status: 'fail', detail: 'No plans' };
    }
  },
  {
    category: 'endpoint',
    icon: '⭐',
    name: 'Reviews',
    method: 'GET',
    path: '/api/reviews',
    test: async () => {
      const r = await fetch('/api/reviews');
      const d = await r.json();
      return d.reviews
        ? { status: 'ok', detail: `${d.count} reviews (avg: ${d.avg_rating}⭐)` }

// ════════════════════════════════════════════════════════════════
// RENDER
// ════════════════════════════════════════════════════════════════

function getCategoryLabel(cat) {
  const labels = { database: '🗄️ Database', endpoint: '🌐 API Endpoints', seed: '🌱 Seed Data', e2e: '🧪 E2E Browser Tests' };
  return labels[cat] || cat;
}

function categoryCount(cat) {
  return TESTS.filter(t => t.category === cat).length;
}

function getMethodClass(method) {
  return `test-method ${method.toLowerCase()}`;
}

function renderResults(results) {
  const container = document.getElementById('resultsContainer');
  const categories = [...new Set(TESTS.map(t => t.category))];

  let html = '';
  for (const cat of categories) {
    const tests = TESTS.filter(t => t.category === cat);
    const catTests = tests.filter(t => results[t.name] !== undefined);
    const catOk = catTests.filter(t => results[t.name]?.status === 'ok').length;
    const catFail = catTests.filter(t => results[t.name]?.status === 'fail').length;
    const catWarn = catTests.filter(t => results[t.name]?.status === 'warning').length;
    const catSkip = catTests.filter(t => results[t.name]?.status === 'skip').length;
    const isCollapsed = state.activeToggles[cat] === false;

    html += `
      <div class="category ${isCollapsed ? 'collapsed' : ''}" data-category="${cat}">
        <div class="category-header" onclick="toggleCollapse('${cat}')">
          <div class="category-header-left">
            <span class="category-icon">${getCategoryLabel(cat).split(' ')[0]}</span>
            <span class="category-name">${getCategoryLabel(cat)}</span>
            <span class="category-count">${catTests.length} tests</span>
          </div>
          <div style="display:flex;align-items:center;gap:0.5rem">
            <span style="font-size:0.6875rem">
              <span style="color:var(--green)">${catOk}✅</span>
              ${catWarn > 0 ? `<span style="color:var(--yellow);margin-left:0.25rem">${catWarn}⚠️</span>` : ''}
              ${catFail > 0 ? `<span style="color:var(--red);margin-left:0.25rem">${catFail}❌</span>` : ''}
              ${catSkip > 0 ? `<span style="color:var(--text-muted);margin-left:0.25rem">${catSkip}⏭️</span>` : ''}
            </span>
            <span class="category-chevron">▼</span>
          </div>
        </div>
        <div class="category-items">
          ${tests.map(t => {
            const result = results[t.name];
            const status = result?.status || 'loading';
            const detail = result?.detail || '';
            const icons = { ok: '✓', fail: '✗', warning: '⚠', skip: '⏭', loading: '◌' };

            return `
              <div class="test-item" data-test="${t.name}">
                <div class="test-item-left">
                  <span class="test-status-icon ${status}">${icons[status] || '◌'}</span>
                  <span>${t.icon}</span>
                  <span class="${getMethodClass(t.method)}">${t.method}</span>
                  <span class="test-path">${t.path}</span>
                </div>
                <div style="display:flex;align-items:center;gap:0.5rem;flex-shrink:0">
                  <span class="test-detail" title="${detail}">${detail || 'Testing...'}</span>
                  <span class="test-status-label ${status}">${status.toUpperCase()}</span>
                </div>
              </div>
            `;
          }).join('')}
        </div>
      </div>
    `;
  }

  container.innerHTML = html;
}

// ════════════════════════════════════════════════════════════════
// RUN CHECKS
// ════════════════════════════════════════════════════════════════

async function runAll() {
  if (state.isLoading) return;
  state.isLoading = true;

  const btn = document.getElementById('refreshBtn');
  btn.disabled = true;
  btn.classList.add('spinning');

  // Reset results to loading state
  const results = {};
  renderResults(results);
  updateScore(results);

  // Run each test sequentially with timeout
  for (const test of TESTS) {
    try {
      const result = await Promise.race([
        test.test(),
        new Promise((_, reject) => setTimeout(() => reject(new Error('Timeout after 15s')), 15000))
      ]);
      results[test.name] = result;
    } catch (err) {
      results[test.name] = { status: 'fail', detail: err.message.slice(0, 80) };
    }

    // Re-render progressively
    renderResults(results);
    updateScore(results);
  }

  state.results = results;
  state.isLoading = false;
  btn.disabled = false;
  btn.classList.remove('spinning');
  document.getElementById('lastUpdated').textContent = `Last updated: ${new Date().toLocaleString('uz-UZ')}`;
}

// ════════════════════════════════════════════════════════════════
// SCORE
// ════════════════════════════════════════════════════════════════

function updateScore(results) {
  const values = Object.values(results);
  const ok = values.filter(r => r.status === 'ok').length;
  const fail = values.filter(r => r.status === 'fail').length;
  const warn = values.filter(r => r.status === 'warning').length;
  const skip = values.filter(r => r.status === 'skip').length;
  const total = ok + fail + warn + skip;
  const tested = total - skip;
  const score = tested > 0 ? Math.round(ok / tested * 100) : 0;

  document.getElementById('statOk').textContent = ok;
  document.getElementById('statWarn').textContent = warn;
  document.getElementById('statFail').textContent = fail;
  document.getElementById('scoreValue').textContent = `${score}%`;
  document.getElementById('scoreTitle').textContent =
    score === 100 ? '🎉 All systems operational!' :
    score >= 80 ? '✅ System is healthy' :
    score >= 50 ? '⚠️ Some issues detected' :
    '❌ Critical issues found';
  document.getElementById('scoreSubtitle').textContent =
    `${ok} passed, ${fail} failed, ${warn} warnings, ${skip} skipped (${total} total)`;

  // Ring animation
  const circumference = 213.6;
  const offset = circumference - (score / 100 * circumference);
  const ring = document.getElementById('scoreRing');
  ring.style.strokeDashoffset = offset;

  // Color based on score
  const color = score === 100 ? '#22c55e' : score >= 80 ? '#3b82f6' : score >= 50 ? '#f59e0b' : '#ef4444';
  ring.style.stroke = color;
}

// ════════════════════════════════════════════════════════════════
// TOGGLES
// ════════════════════════════════════════════════════════════════

function toggleCategory(cat, btn) {
  const isActive = btn.classList.contains('active');
  if (isActive) {
    btn.classList.remove('active');
    btn.classList.add('inactive');
    state.activeToggles[cat] = false;
  } else {
    btn.classList.remove('inactive');
    btn.classList.add('active');
    state.activeToggles[cat] = true;
  }

  // Toggle visibility of category and its tests
  document.querySelectorAll(`.category[data-category="${cat}"]`).forEach(el => {
    if (state.activeToggles[cat]) {
      el.classList.remove('collapsed');
    } else {
      el.classList.add('collapsed');
    }
  });
}

function toggleAll(btn) {
  const allActive = btn.classList.contains('active');
  const categories = ['database', 'endpoint', 'seed', 'e2e'];

  categories.forEach(cat => {
    state.activeToggles[cat] = !allActive;
    const toggleBtn = document.querySelector(`[data-category="${cat}"]`);
    if (toggleBtn) {
      toggleBtn.classList.toggle('active', !allActive);
      toggleBtn.classList.toggle('inactive', allActive);
    }
    document.querySelectorAll(`.category[data-category="${cat}"]`).forEach(el => {
      el.classList.toggle('collapsed', allActive);
    });
  });

  btn.classList.toggle('active', !allActive);
  const inactive = allActive ? 'All inactive' : 'All active';
  btn.textContent = inactive;
}

function toggleCollapse(cat) {
  const el = document.querySelector(`.category[data-category="${cat}"]`);
  if (el) {
    el.classList.toggle('collapsed');
  }
}

// ════════════════════════════════════════════════════════════════
// AUTO-REFRESH
// ════════════════════════════════════════════════════════════════

document.getElementById('refreshInterval').addEventListener('change', function() {
  if (state.interval) {
    clearInterval(state.interval);
    state.interval = null;
  }
  const val = parseInt(this.value);
  if (val > 0) {
    state.interval = setInterval(runAll, val * 1000);
  }
});

// ════════════════════════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════════════════════════

document.addEventListener('DOMContentLoaded', () => {
  runAll();
  // Start auto-refresh with default 30s
  document.getElementById('refreshInterval').value = '30';
  state.interval = setInterval(runAll, 30000);
});

// Expose functions globally
window.runAll = runAll;
window.toggleCategory = toggleCategory;
window.toggleAll = toggleAll;
window.toggleCollapse = toggleCollapse;
